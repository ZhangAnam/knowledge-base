<script>
MV.init();
MV.setup(function () {

  // ── S0: Cover — factor trees for 12 and 18 ──────────────
  document.getElementById('s0-vis').innerHTML =
    '<div style="text-align:center;margin-bottom:8px;font-size:.9em;color:#555">' +

      MV.col(

  document.getElementById('s1-gcd').innerHTML =
    '<div style="font-size:.95em;margin-bottom:6px">12 的所有因数：</div>' +

      '</div>',

    MV.fragDiv(
      '<div style="font-size:.95em;margin-bottom:4px"><b>公因数</b>（两者都整除的数）：</div>' +

    MV.fragDiv(
      '<div class="ans-box ans-gcd">' +
        '<div style="font-size:1.4em;font-weight:bold;color:#27ae60">' +

    MV.fragDiv(
      '<div style="font-size:.95em;margin-bottom:6px">8 的倍数（前几个）：</div>' +

      1

    MV.fragDiv(
      '<div style="font-size:.95em;margin-bottom:4px"><b>公倍数</b>（同时是两者倍数的数）：</div>' +
      '<div style="text-align:center;margin:6px 0">' +
        [24,48,72].map(function(n) {
          return '<span class="chip chip-g">' + n + '</span>';
        }).join(' ') + '&nbsp;...' +
      '</div>',
      2
    ) +
    MV.fragDiv(
      '<div class="ans-box ans-lcm">' +
        '<div style="font-size:1.4em;font-weight:bold;color:#e67e22">' +
          '最小公倍数 LCM(6, 8) = <span style="font-size:1.25em">24</span>' +
        '</div>' +

        '</div>' +
      '</div>',
      3
    );

  // ── S3: GCD by prime factorization ────────────────────
  document.getElementById('s3-gcd-tree').innerHTML =
    MV.row(
      MV.col(
        '<div style="text-align:center;font-weight:bold;color:' + MV.C.blue + ';margin-bottom:4px">12 = 2² × 3</div>',
        '<div style="text-align:center">' + MV.factorTree(12, {w:200, h:145}) + '</div>'

      MV.col(
        '<div style="text-align:center;font-weight:bold;color:' + MV.C.orange + ';margin-bottom:4px">18 = 2 × 3²</div>',
        '<div style="text-align:center">' + MV.factorTree(18, {w:200, h:145}) + '</div>'
      )
    ) +
    MV.fragDiv(
      MV.step(
        '公共质因数取<b style="color:' + MV.C.red + '">最小幂次</b>：<br>' +
        '质因数 2：12 中是 2<sup>2</sup>，18 中是 2<sup>1</sup> → 取 <b>2<sup>1</sup></b><br>' +
        '质因数 3：12 中是 3<sup>1</sup>，18 中是 3<sup>2</sup> → 取 <b>3<sup>1</sup></b><br>' +

    MV.fragDiv(
      MV.tip('口诀：<b>求最大公因数 → 各质因数取较小的幂</b>'),

    '<div style="text-align:center;margin-bottom:8px;font-size:.92em">' +

    '</div>' +
    '<div style="text-align:center">' +
      MV.venn2(
        '12 = 2²×3',
        '18 = 2×3²',
        ['2¹', '(12独有)'],
        ['3¹', '(18独有)'],
        ['2¹×3¹', '= 6'],
        {cA: MV.C.blue, cB: MV.C.orange}
      ) +
    '</div>' +
    MV.fragDiv(
      MV.row(
        '<div style="flex:1;text-align:center;font-size:.88em;color:' + MV.C.blue + '">12 独有的质因数<br>（多出一个 2）</div>',
        '<div style="flex:1;text-align:center;font-size:.88em;color:#27ae60">' +
          '两圆<b>交集</b><br>乘积 = <b>GCD = 6</b>' +
        '</div>',
        '<div style="flex:1;text-align:center;font-size:.88em;color:' + MV.C.orange + '">18 独有的质因数<br>（多出一个 3）</div>'
      ),
      1
    ) +
    MV.fragDiv(
      MV.row(
        MV.col(
          '<div style="background:#eaf4fb;border-radius:8px;padding:10px;text-align:center;font-size:.92em">' +
            '<b>GCD</b> = 交集乘积 = <b style="color:' + MV.C.blue + '">6</b>' +
          '</div>'
        ),
        MV.col(
          '<div style="background:#fef3e2;border-radius:8px;padding:10px;text-align:center;font-size:.92em">' +
            '<b>LCM</b> = 并集乘积 = 2²×3² = <b style="color:' + MV.C.orange + '">36</b>' +
          '</div>'
        )
      ),
      2
    );

  // ── S5: LCM by prime factorization ───────────────────
  document.getElementById('s5-lcm-tree').innerHTML =
    MV.row(
      MV.col(
        '<div style="text-align:center;font-weight:bold;color:' + MV.C.blue + ';margin-bottom:4px">12 = 2² × 3</div>',
        '<div style="text-align:center">' + MV.factorTree(12, {w:200, h:145}) + '</div>'
      ),
      MV.col(
        '<div style="text-align:center;font-weight:bold;color:' + MV.C.orange + ';margin-bottom:4px">18 = 2 × 3²</div>',
        '<div style="text-align:center">' + MV.factorTree(18, {w:200, h:145}) + '</div>'
      )
    ) +
    MV.fragDiv(
      MV.step(
        '各质因数取<b style="color:' + MV.C.red + '">最大幂次</b>：<br>' +
        '质因数 2：12 中是 2<sup>2</sup>，18 中是 2<sup>1</sup> → 取 <b style="color:' + MV.C.blue + '">2<sup>2</sup></b><br>' +
        '质因数 3：12 中是 3<sup>1</sup>，18 中是 3<sup>2</sup> → 取 <b style="color:' + MV.C.orange + '">3<sup>2</sup></b><br>' +
        'LCM = 2<sup>2</sup> × 3<sup>2</sup> = 4 × 9 = <b style="color:' + MV.C.orange + ';font-size:1.15em">36</b>'

      1

    MV.fragDiv(
      MV.row(
        MV.col(

        MV.col(
          '<div style="background:#fef3e2;border-radius:8px;padding:10px 14px;text-align:center">' +
            '<div style="font-size:.8em;color:#888">LCM 口诀</div>' +
            '<div style="font-weight:bold;color:' + MV.C.orange + '">各质因数取<b>大幂</b></div>' +
          '</div>'
        )
      ),
      2
    ) +
    MV.fragDiv(
      MV.tip('两个数的 <b>GCD × LCM = 两数之积</b>：6 × 36 = 12 × 18 = 216 ✓'),
      3
    );

  // ── S6: Example 24 & 36 ───────────────────────────────
  document.getElementById('s6-ex2436').innerHTML =
    MV.row(
      MV.col(
        '<div style="text-align:center;font-weight:bold;color:' + MV.C.blue + ';margin-bottom:4px">24</div>',
        '<div style="text-align:center">' + MV.factorTree(24, {w:195, h:155}) + '</div>',
        '<div style="text-align:center;font-size:.83em;color:' + MV.C.blue + '">24 = 2³ × 3</div>'
      ),
      MV.col(
        '<div style="text-align:center;font-weight:bold;color:' + MV.C.orange + ';margin-bottom:4px">36</div>',
        '<div style="text-align:center">' + MV.factorTree(36, {w:195, h:155}) + '</div>',
        '<div style="text-align:center;font-size:.83em;color:' + MV.C.orange + '">36 = 2² × 3²</div>'
      )
    ) +
    MV.fragDiv(
      '<div class="ans-box ans-gcd">' +
        'GCD(24, 36)：各取<b>小幂</b> → 2<sup>min(3,2)</sup> × 3<sup>min(1,2)</sup> = <b>2² × 3</b> = ' +
        '<b style="color:#27ae60;font-size:1.25em">12</b>' +
      '</div>',

    MV.fragDiv(
      '<div class="ans-box ans-lcm">' +

        '<b style="color:#e67e22;font-size:1.25em">72</b>' +
      '</div>',
      2
    ) +
    MV.fragDiv(
      MV.tip('验证：GCD × LCM = 12 × 72 = 864 = 24 × 36 ✓'),

  document.getElementById('s7-three').innerHTML =

      MV.col(

      MV.col(

    MV.fragDiv(
      MV.step(

  // ── S8: Application 1 — equal division ───────────────
  document.getElementById('s8-equal').innerHTML =
    '<div style="text-align:center;margin-bottom:10px;font-size:.98em">' +
      '🍎 有 <b>24 个苹果</b> 和 <b>36 个梨</b>，平均分成若干组，<br>' +
      '每组苹果数相同、梨数也相同。<b>最多能分成多少组？</b>' +
    '</div>' +
    MV.fragDiv(
      MV.step(
        '<b>分析：</b><br>' +

        '→ <b>最多组数 = GCD(24, 36)</b>'

      1

    MV.fragDiv(
      MV.row(

    MV.fragDiv(

        });
        svg += '<text x="8" y="92" font-size="12" fill="' + MV.C.orange + '" font-weight="bold">乙(8):</text>';
        svg += '<line x1="' + pad + '" y1="95" x2="' + (W - 10) + '" y2="95" stroke="#ddd" stroke-width="1.5"/>';
        [8,16,24,32].forEach(function (v) {
          var x = toX(v);
          var hi = (v === 24);
          svg += '<circle cx="' + x + '" cy="95" r="' + (hi ? 13 : 10) + '" fill="' + (hi ? MV.C.red : MV.C.orange) + '" opacity="0.85"/>';
          svg += '<text x="' + x + '" y="99" text-anchor="middle" font-size="11" fill="white" font-weight="bold">' + v + '</text>';
        });
        var x24 = toX(24);
        svg += '<line x1="' + x24 + '" y1="53" x2="' + x24 + '" y2="82" stroke="' + MV.C.red + '" stroke-width="2.5" stroke-dasharray="4,2"/>';
        svg += '<text x="' + (x24 + 15) + '" y="72" font-size="12" fill="' + MV.C.red + '" font-weight="bold">同时！</text>';
        return '<div style="text-align:center">' + MV.svg(W, H, svg) + '</div>';
      }()),
      2
    ) +
    MV.fragDiv(
      '<div class="ans-box ans-lcm">' +
        'LCM(6, 8) = 2³ × 3 = <b style="color:#e67e22;font-size:1.3em">24 天</b>后再次同时出现' +
      '</div>',
      3
    ) +
    MV.fragDiv(
      MV.tip('<b>周期相遇问题 → 用 LCM</b>（最小公倍数 = 下次相遇所需天数）'),
      4
    );

  // ── S10: Practice ─────────────────────────────────────
  document.getElementById('s10-practice').innerHTML =
    '<div style="font-size:.93em">' +
    '<ol style="line-height:2.1">' +
      '<li>GCD(16, 24) = ?&ensp;LCM(16, 24) = ?' +
        MV.frag('&ensp;→ <b class="kw2">GCD = 8，LCM = 48</b>', 1) + '</li>' +
      '<li>GCD(30, 42) = ?&ensp;LCM(30, 42) = ?' +
        MV.frag('&ensp;→ <b class="kw2">GCD = 6，LCM = 210</b>', 2) + '</li>' +
      '<li>LCM(4, 6, 10) = ?' +
        MV.frag('&ensp;→ <b class="kw2">60</b>（4=2²，6=2×3，10=2×5 → 2²×3×5）', 3) + '</li>' +
      '<li>甲 5 天来一次，乙 7 天来一次。同时来最少间隔几天？' +
        MV.frag('&ensp;→ <b class="kw2">LCM(5,7) = 35 天</b>（互质，取乘积）', 4) + '</li>' +
      '<li>48 颗糖、60 颗巧克力，每份数量相同，最多分多少份？' +
        MV.frag('&ensp;→ <b class="kw2">GCD(48,60) = 12 份</b>', 5) + '</li>' +
    '</ol>' +
    '</div>' +
    MV.fragDiv(
      MV.warn('做题前，<b>先写质因数分解式</b>——不要强行心算最大公因数或最小公倍数！'),
      6
    );

});
